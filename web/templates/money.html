<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Tracker</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .money-layout {
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 16px 60px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── Summary cards ── */
    .money-summary {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media (min-width: 520px) {
      .money-summary { grid-template-columns: repeat(4, 1fr); }
    }
    .money-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .money-card-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    .money-card-value {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .money-card-value.positive { color: var(--green); }
    .money-card-value.negative { color: var(--red); }
    .money-card-sub { font-size: 12px; color: var(--text-muted); }

    /* ── Action buttons ── */
    .money-actions { display: flex; gap: 10px; }
    .btn-deposit, .btn-withdraw, .btn-parlay {
      flex: 1;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-deposit  { background: rgba(34,197,94,0.15);  color: var(--green);  border: 1px solid rgba(34,197,94,0.3); }
    .btn-withdraw { background: rgba(239,68,68,0.12);  color: var(--red);    border: 1px solid rgba(239,68,68,0.25); }
    .btn-parlay   { background: rgba(99,102,241,0.12); color: var(--accent); border: 1px solid rgba(99,102,241,0.3); }
    .btn-deposit:hover, .btn-withdraw:hover, .btn-parlay:hover { opacity: 0.8; }

    /* ── History ── */
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      padding: 40px 0;
    }
    .history-row {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .history-row:hover { border-color: var(--border-light); }
    .history-row.parlay-row.pending { border-color: rgba(99,102,241,0.3); }
    .history-row.parlay-row.won    { border-color: rgba(34,197,94,0.3); }
    .history-row.parlay-row.lost   { border-color: rgba(239,68,68,0.2); opacity: 0.7; }

    .history-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .history-icon.deposit    { background: rgba(34,197,94,0.12); }
    .history-icon.withdraw   { background: rgba(239,68,68,0.10); }
    .history-icon.parlay     { background: rgba(99,102,241,0.12); }
    .history-icon.parlay-won { background: rgba(34,197,94,0.15); color: var(--green); font-weight:700; }
    .history-icon.parlay-lost{ background: rgba(239,68,68,0.12); color: var(--red);   font-weight:700; }

    .history-info { flex: 1; min-width: 0; }
    .history-type { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .history-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .history-amount { font-size: 16px; font-weight: 700; flex-shrink: 0; }
    .history-amount.deposit  { color: var(--green); }
    .history-amount.withdraw { color: var(--red); }
    .history-amount.parlay-stake { color: var(--text-muted); font-size: 14px; }

    .history-del {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 14px; padding: 4px 6px; border-radius: 4px;
      opacity: 0.5; transition: opacity 0.15s; flex-shrink: 0;
    }
    .history-del:hover { opacity: 1; color: var(--red); }

    /* Parlay-specific bits */
    .odds-pill {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(99,102,241,0.15);
      color: var(--accent);
    }
    .settle-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.04em;
    }
    .settle-badge.won  { background: rgba(34,197,94,0.15);  color: var(--green); }
    .settle-badge.lost { background: rgba(239,68,68,0.12);  color: var(--red); }

    .parlay-settle { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-settle {
      padding: 5px 12px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-settle.won  { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .btn-settle.lost { background: rgba(239,68,68,0.12); color: var(--red);   border: 1px solid rgba(239,68,68,0.25); }
    .btn-settle:hover { opacity: 0.75; }

    /* ── Modals ── */
    .money-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
    }
    .money-backdrop.visible { display: block; }

    .money-modal {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 480px;
      background: var(--bg-modal);
      border: 1px solid var(--border-light);
      border-bottom: none;
      border-radius: var(--radius) var(--radius) 0 0;
      z-index: 300;
      padding: 0 0 28px;
      transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
      box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
    }
    .money-modal.visible { transform: translateX(-50%) translateY(0); }

    .money-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .money-modal-title { font-size: 16px; font-weight: 700; }
    .money-modal-title.deposit  { color: var(--green); }
    .money-modal-title.withdraw { color: var(--red); }
    .money-modal-title.parlay   { color: var(--accent); }

    .money-modal-form {
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Payout preview box */
    .payout-preview {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .payout-preview-label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    .payout-preview-values { text-align: right; }
    .payout-total  { font-size: 20px; font-weight: 700; color: var(--text); }
    .payout-profit { font-size: 13px; color: var(--green); font-weight: 600; margin-top: 2px; }

    .btn-confirm-money {
      padding: 12px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
    }
    .btn-confirm-money.deposit  { background: var(--green);  color: #000; }
    .btn-confirm-money.withdraw { background: var(--red);    color: #fff; }
    .btn-confirm-money.parlay   { background: var(--accent); color: #fff; }
    .btn-confirm-money:hover { opacity: 0.85; }

    /* Inline link button */
    .btn-link-parlay {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid rgba(99,102,241,0.3);
      background: rgba(99,102,241,0.1);
      color: var(--accent);
      cursor: pointer;
      margin-left: 6px;
      transition: opacity 0.15s;
    }
    .btn-link-parlay:hover { opacity: 0.75; }

    /* Inline link panel */
    .link-panel {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .link-panel-select { flex: 1; min-width: 160px; font-size: 13px; padding: 7px 10px; }

    /* Linked parlay leg chips */
    .linked-legs {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 6px;
    }
    .linked-leg-chip {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      background: rgba(99,102,241,0.12);
      color: var(--accent);
      border: 1px solid rgba(99,102,241,0.2);
      white-space: nowrap;
    }
    .linked-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-left: 6px;
    }
    #parlay-legs-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      min-height: 0;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-dot"></div>
        NBA Predictor
      </div>
      <span class="header-date">{{ date }}</span>
      <div class="header-spacer"></div>
      <a href="/" class="nav-link">Dashboard</a>
      <a href="/analysis" class="nav-link">AI Analysis</a>
      <a href="/live" class="nav-link">Live Tracker</a>
      <a href="/money" class="nav-link active">Money</a>
      <a href="/model" class="nav-link">Model</a>
      <a href="/player-model" class="nav-link">Player Model</a>
    </div>
  </header>

  <main class="money-layout">

    <!-- Summary cards -->
    <div class="money-summary">
      <div class="money-card">
        <span class="money-card-label">Total In</span>
        <span class="money-card-value" id="stat-in">$0</span>
        <span class="money-card-sub" id="stat-in-count">0 deposits</span>
      </div>
      <div class="money-card">
        <span class="money-card-label">Total Out</span>
        <span class="money-card-value" id="stat-out">$0</span>
        <span class="money-card-sub" id="stat-out-count">0 withdrawals</span>
      </div>
      <div class="money-card">
        <span class="money-card-label">Net P&amp;L</span>
        <span class="money-card-value" id="stat-pnl">$0</span>
        <span class="money-card-sub" id="stat-roi">0.0% ROI</span>
      </div>
      <div class="money-card">
        <span class="money-card-label">Balance</span>
        <span class="money-card-value" id="stat-balance">$0</span>
        <span class="money-card-sub" id="stat-balance-sub">on account</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="money-actions">
      <button class="btn-deposit"  id="btn-deposit">+ Deposit</button>
      <button class="btn-parlay"   id="btn-parlay">🎰 Place Parlay</button>
      <button class="btn-withdraw" id="btn-withdraw">− Withdraw</button>
    </div>

    <!-- History -->
    <section>
      <div class="section-header" style="margin-bottom:14px">
        <h2 class="section-title">Transaction History</h2>
        <div class="header-spacer"></div>
        <button style="font-size:12px;background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px 8px;border-radius:4px" onclick="confirmClearAll()">Clear all</button>
      </div>
      <div class="history-list" id="history-list"></div>
    </section>

  </main>

  <!-- Deposit / Withdraw backdrop + modal -->
  <div id="money-backdrop" class="money-backdrop"></div>
  <div id="money-modal" class="money-modal">
    <div class="modal-drag-handle"></div>
    <div class="money-modal-header">
      <span id="money-modal-title" class="money-modal-title deposit">Add Deposit</span>
      <button class="btn-close" id="money-modal-close">✕</button>
    </div>
    <div class="money-modal-form">
      <div class="form-group">
        <label class="form-label">Amount ($)</label>
        <input type="number" id="money-amount" class="form-input" placeholder="e.g. 100" min="0.01" step="0.01">
      </div>
      <div class="form-group">
        <label class="form-label">Note <span class="form-label-opt">(optional)</span></label>
        <input type="text" id="money-note" class="form-input" placeholder="e.g. DraftKings deposit" autocomplete="off">
      </div>
      <button id="money-confirm" class="btn-confirm-money deposit">Add Deposit</button>
    </div>
  </div>

  <!-- Parlay backdrop + modal -->
  <div id="parlay-backdrop" class="money-backdrop"></div>
  <div id="parlay-modal" class="money-modal">
    <div class="modal-drag-handle"></div>
    <div class="money-modal-header">
      <span class="money-modal-title parlay">Place Parlay Bet</span>
      <button class="btn-close" id="parlay-modal-close">✕</button>
    </div>
    <div class="money-modal-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Stake ($)</label>
          <input type="number" id="parlay-stake" class="form-input" placeholder="e.g. 20" min="0.01" step="0.01">
        </div>
        <div class="form-group">
          <label class="form-label">American Odds</label>
          <input type="number" id="parlay-odds" class="form-input" placeholder="e.g. +350 or -110">
        </div>
      </div>
      <!-- Live payout preview -->
      <div class="payout-preview">
        <div>
          <div class="payout-preview-label">Potential Payout</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:3px">if this parlay hits</div>
        </div>
        <div class="payout-preview-values">
          <div class="payout-total"  id="parlay-payout-preview">—</div>
          <div class="payout-profit" id="parlay-profit-preview">—</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Link to Live Parlay <span class="form-label-opt">(optional)</span></label>
        <select id="parlay-link-select" class="form-input"></select>
        <div id="parlay-legs-preview"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Note <span class="form-label-opt">(optional)</span></label>
        <input type="text" id="parlay-note" class="form-input" placeholder="e.g. Jokic PTS + Lakers ML" autocomplete="off">
      </div>
      <button id="parlay-confirm" class="btn-confirm-money parlay">Place Bet</button>
    </div>
  </div>

  <script src="/static/money.js"></script>
</body>
</html>
